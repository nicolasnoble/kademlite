// libp2p Identify protocol message
// Reference: https://github.com/libp2p/specs/blob/master/identify/README.md

syntax = "proto3";
package identify;

message Identify {
    bytes publicKey = 1;
    repeated bytes listenAddrs = 2;
    repeated string protocols = 3;
    bytes observedAddr = 4;
    string protocolVersion = 5;
    string agentVersion = 6;
}
