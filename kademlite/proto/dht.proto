// libp2p Kademlia DHT protocol messages
// Reference: https://github.com/libp2p/specs/blob/master/kad-dht/README.md

syntax = "proto3";
package dht.pb;

message Record {
    bytes key = 1;
    bytes value = 2;
    bytes author = 3;           // peer ID of the originator (unused in practice)
    bytes signature = 4;        // signature of [key + value + author] (unused in practice)
    string timeReceived = 5;    // deprecated but still sent by some implementations
    // rust-libp2p uses non-standard field numbers for these:
    bytes publisher = 666;      // peer ID of the record's original publisher
    uint32 ttl = 777;           // record TTL in seconds (transmitted between peers)
}

message Message {
    enum MessageType {
        PUT_VALUE = 0;
        GET_VALUE = 1;
        ADD_PROVIDER = 2;
        GET_PROVIDERS = 3;
        FIND_NODE = 4;
        PING = 5;
    }

    enum ConnectionType {
        NOT_CONNECTED = 0;
        CONNECTED = 1;
        CAN_CONNECT = 2;
        CANNOT_CONNECT = 3;
    }

    message Peer {
        bytes id = 1;
        repeated bytes addrs = 2;
        ConnectionType connection = 3;
    }

    MessageType type = 1;
    bytes key = 2;
    Record record = 3;
    repeated Peer closerPeers = 8;
    repeated Peer providerPeers = 9;
    int32 clusterLevelRaw = 10;
}
