# Multi-node DHT test deployment for k8s.
#
# Deploys DHT peer nodes + 1 test job, all using DNS-based peer discovery:
#   - Peers discover each other via headless Service DNS (zero config)
#   - Test job joins the DHT, runs PUT/GET tests, then exits
#
# Default: 3 peers. Override via run_k8s_test.sh --replicas N (e.g. 200 for scale test).
#
# Usage:
#   docker build -t localhost:32000/dht-test:latest -f tests/k8s/Dockerfile .
#   docker push localhost:32000/dht-test:latest
#   kubectl apply -f k8s-dht-test.yaml
#   kubectl logs -f job/dht-test -n dht-test
#   kubectl delete ns dht-test
---
apiVersion: v1
kind: Namespace
metadata:
  name: dht-test
---
# Headless service for DNS-based peer discovery.
# All DHT pods (peers + test) register here. Resolving this service
# name returns all pod IPs, enabling zero-config bootstrap.
apiVersion: v1
kind: Service
metadata:
  name: kdl-dht
  namespace: dht-test
spec:
  clusterIP: None
  selector:
    app: dht-peer
  ports:
    - port: 4001
      targetPort: 4001
      protocol: TCP
---
# DHT peer nodes - Deployment launches all replicas in parallel.
# Spread across physical nodes via anti-affinity (best-effort).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dht-peer
  namespace: dht-test
spec:
  replicas: 3
  selector:
    matchLabels:
      app: dht-peer
  template:
    metadata:
      labels:
        app: dht-peer
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: dht-peer
                topologyKey: kubernetes.io/hostname
      containers:
        - name: dht
          image: localhost:32000/dht-test:latest
          args: ["--role", "peer", "--listen", "0.0.0.0:4001"]
          ports:
            - containerPort: 4001
          env:
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: BOOTSTRAP_DNS
              value: "kdl-dht.dht-test.svc.cluster.local"
          resources:
            requests:
              cpu: 100m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
          readinessProbe:
            tcpSocket:
              port: 4001
            initialDelaySeconds: 5
            periodSeconds: 5
---
# RBAC for the test pod (needed by soak test to trigger rollout restarts)
apiVersion: v1
kind: ServiceAccount
metadata:
  name: dht-test-sa
  namespace: dht-test
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: dht-test-role
  namespace: dht-test
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: dht-test-binding
  namespace: dht-test
subjects:
  - kind: ServiceAccount
    name: dht-test-sa
    namespace: dht-test
roleRef:
  kind: Role
  name: dht-test-role
  apiGroup: rbac.authorization.k8s.io
---
# Test job - waits for peers, joins DHT via DNS, runs tests, exits
apiVersion: batch/v1
kind: Job
metadata:
  name: dht-test
  namespace: dht-test
spec:
  backoffLimit: 0
  template:
    metadata:
      labels:
        app: dht-test
    spec:
      serviceAccountName: dht-test-sa
      restartPolicy: Never
      initContainers:
        # Wait for enough peers to be ready before running tests.
        # MIN_PEERS is injected by run_k8s_test.sh based on replica count.
        - name: wait-peers
          image: busybox:1.36
          env:
            - name: MIN_PEERS
              value: "2"
          command: ["sh", "-c"]
          args:
            - |
              echo "Waiting for at least $MIN_PEERS DHT peers..."
              while true; do
                ready=$(nslookup kdl-dht.dht-test.svc.cluster.local 2>/dev/null | grep -c 'Address:' || true)
                # nslookup output includes the DNS server address, so subtract 1
                peers=$((ready - 1))
                if [ "$peers" -ge "$MIN_PEERS" ]; then
                  echo "Found $peers peer(s), proceeding"
                  break
                fi
                echo "Only $peers/$MIN_PEERS peer(s) ready, waiting..."
                sleep 2
              done
              # Brief settle to let DNS propagate
              echo "Settling for 5s..."
              sleep 5
      containers:
        - name: dht
          image: localhost:32000/dht-test:latest
          args: ["--role", "test", "--listen", "0.0.0.0:4001"]
          env:
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: BOOTSTRAP_DNS
              value: "kdl-dht.dht-test.svc.cluster.local"
